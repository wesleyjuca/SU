name: 🔼 Deploy Frontend (Vercel)

on:
  workflow_dispatch:
    inputs:
      vercel_token:
        description: 'Vercel Personal Access Token (vercel.com/account/tokens)'
        required: true
        type: string
      railway_url:
        description: 'Railway backend URL (ex: https://afj-core-production.up.railway.app)'
        required: false
        default: ''
        type: string

jobs:
  deploy:
    name: Deploy para Vercel
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        # sem ref fixo — usa main (branch padrão do repositório)

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Mask token in logs
        run: echo "::add-mask::${{ github.event.inputs.vercel_token }}"

      - name: Install Vercel CLI
        run: npm install -g vercel

      # ── Configurar NEXT_PUBLIC_API_URL ANTES do deploy ────────────────────
      - name: Pre-configure NEXT_PUBLIC_API_URL
        if: github.event.inputs.railway_url != ''
        env:
          VERCEL_TOKEN: ${{ github.event.inputs.vercel_token }}
        run: |
          RAILWAY_URL="${{ github.event.inputs.railway_url }}"
          echo "Configurando NEXT_PUBLIC_API_URL=$RAILWAY_URL antes do deploy..."
          cd frontend

          # Remove env var se existir (ignora erro)
          vercel env rm NEXT_PUBLIC_API_URL production --yes --token "$VERCEL_TOKEN" 2>/dev/null || true

          # Adiciona env var antes do build
          echo "$RAILWAY_URL" | vercel env add NEXT_PUBLIC_API_URL production \
            --token "$VERCEL_TOKEN" --yes 2>&1 || \
            echo "::warning::Failed to set env var — configure manualmente no Vercel dashboard"

      # ── Deploy from frontend/ (rootDirectory must be set in Vercel dashboard) ──
      - name: Deploy to Vercel (production)
        id: deploy
        env:
          VERCEL_TOKEN: ${{ github.event.inputs.vercel_token }}
        run: |
          echo "Iniciando deploy no Vercel..."
          cd frontend
          DEPLOY_OUTPUT=$(vercel --yes --prod --token "$VERCEL_TOKEN" --name "afj-core" 2>&1)
          EXIT_CODE=$?
          echo "$DEPLOY_OUTPUT"

          if [ $EXIT_CODE -eq 0 ]; then
            DEPLOY_URL=$(echo "$DEPLOY_OUTPUT" | grep -oP 'https://[a-zA-Z0-9._-]+\.vercel\.app' | tail -1 || echo "")
            echo "VERCEL_URL=$DEPLOY_URL" >> $GITHUB_ENV
            echo "url=$DEPLOY_URL" >> $GITHUB_OUTPUT
            echo ""
            echo "════════════════════════════════════════════"
            echo "  ✅ FRONTEND PUBLICADO!"
            echo "  URL: $DEPLOY_URL"
            echo "════════════════════════════════════════════"
          else
            echo "::error::Deploy falhou. Verifique os logs acima."
            exit 1
          fi

      # ── Atualizar CORS no Railway com URL Vercel ──────────────────────────
      - name: Update Railway CORS with Vercel URL
        if: env.VERCEL_URL != ''
        env:
          # Add RAILWAY_TOKEN to GitHub Settings → Secrets → Actions
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          echo "Atualizando CORS no Railway com: $VERCEL_URL"
          npm install -g @railway/cli 2>/dev/null

          cd backend
          railway variables set \
            CORS_ORIGINS="[\"$VERCEL_URL\",\"http://localhost:3000\"]" \
            2>&1 || echo "::warning::CORS update failed — atualize manualmente no Railway dashboard"

          echo ""
          echo "════════════════════════════════════════════"
          echo "  ✅ DEPLOY COMPLETO!"
          echo "  Frontend: $VERCEL_URL"
          echo "  Backend:  ${{ github.event.inputs.railway_url }}"
          echo "════════════════════════════════════════════"
