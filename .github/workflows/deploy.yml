name: 🚀 Deploy AFJ CORE SYSTEM

on:
  workflow_dispatch:
  push:
    branches:
      - claude/afj-core-system-OlGA2
    paths:
      - 'backend/**'
      - '.github/workflows/deploy.yml'

# ─── Credenciais ─────────────────────────────────────────────────────────────
# RAILWAY_TOKEN está inline pois foi fornecido pelo usuário para automação.
# Recomendado: mover para GitHub Secrets (Settings → Secrets → RAILWAY_TOKEN)
# ANTHROPIC_API_KEY, OPENAI_API_KEY, QDRANT_URL: adicionar via GitHub Secrets
# ─────────────────────────────────────────────────────────────────────────────

env:
  RAILWAY_TOKEN: aa2353a4-96fb-4f34-ae0c-ec8895ffebaf
  SECRET_KEY: 06e9759820d1a9b579b62f05fb26e77389b1a9ef373235346a635ecf1ce623e1
  ENCRYPTION_KEY: 7703b66ec188de9e9eb7d70a18bea12e88f973870da06fe870fbc7c6a57cf1af

jobs:
  # ───────────────────────────────────────────────────────────────────────────
  deploy-railway:
    name: 🚂 Backend — Railway
    runs-on: ubuntu-latest
    outputs:
      railway_url: ${{ steps.get_url.outputs.url }}
      project_id: ${{ steps.init.outputs.project_id }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup tools
        run: |
          sudo apt-get update -q && sudo apt-get install -y jq
          npm install -g @railway/cli

      - name: Verify Railway auth
        run: |
          echo "Verifying Railway authentication..."
          railway whoami 2>&1 || echo "Auth check complete"

      # ── Criar projeto no Railway via API GraphQL ──────────────────────────
      - name: Create Railway project
        id: init
        run: |
          echo "Creating Railway project via API..."
          RESPONSE=$(curl -s -X POST "https://backboard.railway.app/graphql/v2" \
            -H "Authorization: Bearer $RAILWAY_TOKEN" \
            -H "Content-Type: application/json" \
            --data-raw '{
              "query": "mutation { projectCreate(input: { name: \"afj-core\" }) { id environments { edges { node { id name } } } } }"
            }')

          echo "API Response: $RESPONSE"
          PROJECT_ID=$(echo "$RESPONSE" | jq -r '.data.projectCreate.id // empty')
          ENV_ID=$(echo "$RESPONSE" | jq -r '.data.projectCreate.environments.edges[0].node.id // empty')

          if [ -z "$PROJECT_ID" ]; then
            echo "::warning::Could not create project via API. Trying Railway CLI..."
            # Fallback: use railway CLI
            cd backend
            echo "afj-core" | railway init 2>&1 || true
            PROJECT_INFO=$(railway status --json 2>/dev/null || echo "{}")
            PROJECT_ID=$(echo "$PROJECT_INFO" | jq -r '.projectId // empty' || echo "")
            ENV_ID=$(echo "$PROJECT_INFO" | jq -r '.environmentId // empty' || echo "")
          fi

          echo "PROJECT_ID=$PROJECT_ID" >> $GITHUB_ENV
          echo "ENV_ID=$ENV_ID" >> $GITHUB_ENV
          echo "project_id=$PROJECT_ID" >> $GITHUB_OUTPUT
          echo "env_id=$ENV_ID" >> $GITHUB_OUTPUT
          echo "Railway Project ID: $PROJECT_ID"
          echo "Railway Environment ID: $ENV_ID"

      # ── Provisionar PostgreSQL ────────────────────────────────────────────
      - name: Provision PostgreSQL
        if: env.PROJECT_ID != ''
        run: |
          echo "Provisioning PostgreSQL..."
          RESPONSE=$(curl -s -X POST "https://backboard.railway.app/graphql/v2" \
            -H "Authorization: Bearer $RAILWAY_TOKEN" \
            -H "Content-Type: application/json" \
            --data-raw "{
              \"query\": \"mutation { pluginCreate(input: { name: \\\"postgresql\\\", projectId: \\\"$PROJECT_ID\\\", environmentId: \\\"$ENV_ID\\\" }) { id } }\"
            }")
          echo "PostgreSQL response: $RESPONSE"
          # Fallback para nova API Railway
          if echo "$RESPONSE" | grep -q "error\|null"; then
            RESPONSE=$(curl -s -X POST "https://backboard.railway.app/graphql/v2" \
              -H "Authorization: Bearer $RAILWAY_TOKEN" \
              -H "Content-Type: application/json" \
              --data-raw "{
                \"query\": \"mutation { serviceCreate(input: { projectId: \\\"$PROJECT_ID\\\", name: \\\"postgres\\\", source: { image: \\\"ghcr.io/railwayapp-templates/postgres-ssl:edge\\\" } }) { id } }\"
              }")
            echo "PostgreSQL service response: $RESPONSE"
          fi

      # ── Provisionar Redis ─────────────────────────────────────────────────
      - name: Provision Redis
        if: env.PROJECT_ID != ''
        run: |
          echo "Provisioning Redis..."
          RESPONSE=$(curl -s -X POST "https://backboard.railway.app/graphql/v2" \
            -H "Authorization: Bearer $RAILWAY_TOKEN" \
            -H "Content-Type: application/json" \
            --data-raw "{
              \"query\": \"mutation { pluginCreate(input: { name: \\\"redis\\\", projectId: \\\"$PROJECT_ID\\\", environmentId: \\\"$ENV_ID\\\" }) { id } }\"
            }")
          echo "Redis response: $RESPONSE"

      - name: Wait for databases to initialize
        run: sleep 20

      # ── Configurar variáveis de ambiente ──────────────────────────────────
      - name: Set environment variables
        run: |
          cd backend
          railway variables set \
            SECRET_KEY="$SECRET_KEY" \
            ENCRYPTION_KEY="$ENCRYPTION_KEY" \
            ENVIRONMENT="production" \
            DEBUG="false" \
            ANTHROPIC_API_KEY="${{ secrets.ANTHROPIC_API_KEY }}" \
            OPENAI_API_KEY="${{ secrets.OPENAI_API_KEY }}" \
            QDRANT_URL="${{ secrets.QDRANT_URL || 'http://localhost:6333' }}" \
            QDRANT_API_KEY="${{ secrets.QDRANT_API_KEY }}" \
            CORS_ORIGINS='["https://afj-core.vercel.app","https://afj-core-wesleyjuca.vercel.app","http://localhost:3000"]' \
            2>&1 || echo "::warning::Variables set failed - may need manual configuration"

      # ── Deploy do backend via Dockerfile ─────────────────────────────────
      - name: Deploy backend
        run: |
          cd backend
          echo "Starting Railway deployment..."
          railway up --detach 2>&1 || railway up 2>&1 || echo "::warning::Deploy command failed - check Railway dashboard"
          echo "Deploy command sent to Railway"

      # ── Obter URL do serviço ──────────────────────────────────────────────
      - name: Get Railway URL
        id: get_url
        run: |
          echo "Waiting for deployment to complete..."
          sleep 30

          cd backend
          # Try to get domain from Railway CLI
          DOMAIN=""

          # Method 1: railway domain command
          DOMAIN=$(railway domain 2>/dev/null | grep -oP '[a-zA-Z0-9-]+\.up\.railway\.app' | head -1 || echo "")

          # Method 2: railway status JSON
          if [ -z "$DOMAIN" ]; then
            STATUS=$(railway status --json 2>/dev/null || echo "{}")
            DOMAIN=$(echo "$STATUS" | jq -r '.deploymentDomain // .domain // empty' 2>/dev/null || echo "")
          fi

          # Method 3: Railway API
          if [ -z "$DOMAIN" ] && [ -n "$PROJECT_ID" ]; then
            SERVICES=$(curl -s -X POST "https://backboard.railway.app/graphql/v2" \
              -H "Authorization: Bearer $RAILWAY_TOKEN" \
              -H "Content-Type: application/json" \
              --data-raw "{
                \"query\": \"{ project(id: \\\"$PROJECT_ID\\\") { services { edges { node { id name domains { edges { node { domain } } } } } } } }\"
              }")
            DOMAIN=$(echo "$SERVICES" | jq -r '.data.project.services.edges[0].node.domains.edges[0].node.domain // empty' 2>/dev/null || echo "")
          fi

          if [ -n "$DOMAIN" ]; then
            [[ "$DOMAIN" != http* ]] && RAILWAY_URL="https://$DOMAIN" || RAILWAY_URL="$DOMAIN"
          else
            RAILWAY_URL="https://afj-core-production.up.railway.app"
            echo "::warning::Could not determine Railway URL, using placeholder"
          fi

          echo "url=$RAILWAY_URL" >> $GITHUB_OUTPUT
          echo "Railway URL: $RAILWAY_URL"

      # ── Resumo ────────────────────────────────────────────────────────────
      - name: Deployment summary
        run: |
          echo ""
          echo "═══════════════════════════════════════════════"
          echo "  AFJ CORE SYSTEM — Railway Backend"
          echo "═══════════════════════════════════════════════"
          echo "  URL: ${{ steps.get_url.outputs.url }}"
          echo "  Project ID: $PROJECT_ID"
          echo ""
          echo "  Próximos passos:"
          echo "  1. Adicionar ANTHROPIC_API_KEY no Railway dashboard"
          echo "  2. Adicionar OPENAI_API_KEY no Railway dashboard"
          echo "  3. Verificar: ${{ steps.get_url.outputs.url }}/health"
          echo "═══════════════════════════════════════════════"

  # ───────────────────────────────────────────────────────────────────────────
  deploy-vercel:
    name: 🔼 Frontend — Vercel
    runs-on: ubuntu-latest
    needs: deploy-railway
    if: always()

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Deploy to Vercel
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          RAILWAY_URL: ${{ needs.deploy-railway.outputs.railway_url }}
        run: |
          if [ -z "$VERCEL_TOKEN" ]; then
            echo "::notice::VERCEL_TOKEN not set — skipping Vercel deployment."
            echo "Para habilitar: Settings → Secrets → New secret → VERCEL_TOKEN"
            echo "Obtenha o token em: https://vercel.com/account/tokens"
            exit 0
          fi

          npm install -g vercel
          cd frontend

          # Set NEXT_PUBLIC_API_URL env var in project (create or update)
          if [ -n "$RAILWAY_URL" ]; then
            echo "Configurando NEXT_PUBLIC_API_URL=$RAILWAY_URL..."
            # Remove existing env var if present (ignore errors)
            vercel env rm NEXT_PUBLIC_API_URL production --yes --token "$VERCEL_TOKEN" 2>/dev/null || true
            # Add updated env var
            echo "$RAILWAY_URL" | vercel env add NEXT_PUBLIC_API_URL production --token "$VERCEL_TOKEN" --yes 2>/dev/null || true
          fi

          # Deploy from frontend/ (rootDirectory configured in Vercel dashboard)
          echo "Iniciando deploy no Vercel..."
          DEPLOY_OUTPUT=$(vercel --yes --prod --token "$VERCEL_TOKEN" --name "afj-core" 2>&1)
          echo "$DEPLOY_OUTPUT"

          # Extract deployment URL
          DEPLOY_URL=$(echo "$DEPLOY_OUTPUT" | grep -oP 'https://[a-zA-Z0-9._-]+\.vercel\.app' | tail -1 || echo "")
          if [ -n "$DEPLOY_URL" ]; then
            echo ""
            echo "═══════════════════════════════════════════════"
            echo "  Frontend Vercel: $DEPLOY_URL"
            echo "═══════════════════════════════════════════════"
          fi

      - name: Update Railway CORS with Vercel URL
        if: env.VERCEL_TOKEN != ''
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          RAILWAY_URL: ${{ needs.deploy-railway.outputs.railway_url }}
        run: |
          if [ -z "$VERCEL_TOKEN" ] || [ -z "$RAILWAY_URL" ]; then
            exit 0
          fi
          # Get Vercel production URL to update Railway CORS
          VERCEL_URL=$(cd frontend && vercel ls --token "$VERCEL_TOKEN" 2>/dev/null | grep 'afj' | head -1 | awk '{print $2}' || echo "")
          if [ -n "$VERCEL_URL" ]; then
            echo "Atualizando CORS no Railway com URL Vercel: $VERCEL_URL"
            cd backend
            railway variables set \
              CORS_ORIGINS="[\"https://$VERCEL_URL\",\"http://localhost:3000\"]" \
              2>&1 || echo "CORS update failed - update manually on Railway dashboard"
          fi
