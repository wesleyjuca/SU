// ── CONFIG ────────────────────────────────────────────────────────────────────
var SB_URL      = (window.__SB_URL__     || '').replace(/\/$/, '');
var SB_ANON     = window.__SB_ANON__    || '';
var CLAUDE_KEY  = window.__CLAUDE_KEY__ || '';
var SB_OK       = !!(SB_URL && SB_ANON);
var _tok        = null; // JWT em memória — NUNCA em localStorage

function _hdr(extra) {
  var o = { 'Content-Type': 'application/json', 'apikey': SB_ANON, 'Prefer': 'return=representation' };
  if (_tok) o['Authorization'] = 'Bearer ' + _tok;
  return Object.assign(o, extra || {});
}
function _err(r) { return r.json().then(function(e) { throw new Error(e.message || String(r.status)); }); }

function sbGet(t, qs)    { return fetch(SB_URL+'/rest/v1/'+t+(qs?'?'+qs:''),{headers:_hdr()}).then(function(r){return r.ok?r.json():_err(r);}); }
function sbPost(t, body) { return fetch(SB_URL+'/rest/v1/'+t,{method:'POST',headers:_hdr(),body:JSON.stringify(body)}).then(function(r){return r.ok?r.json():_err(r);}); }
function sbPatch(t, f, b){ return fetch(SB_URL+'/rest/v1/'+t+'?'+f,{method:'PATCH',headers:_hdr(),body:JSON.stringify(b)}).then(function(r){return r.ok?r.json():_err(r);}); }
function sbDel(t, f)     { return fetch(SB_URL+'/rest/v1/'+t+'?'+f,{method:'DELETE',headers:_hdr()}).then(function(r){return r.ok?(r.status===204?[]:r.json()):_err(r);}); }
function sbUpsert(t, b, on){ var hd=Object.assign(_hdr(),{'Prefer':'resolution=merge-duplicates,return=representation'}); return fetch(SB_URL+'/rest/v1/'+t+(on?'?on_conflict='+on:''),{method:'POST',headers:hd,body:JSON.stringify(b)}).then(function(r){return r.ok?r.json():_err(r);}); }

var sbAuth = {
  signIn: function(email, pwd) {
    return fetch(SB_URL+'/auth/v1/token?grant_type=password',{method:'POST',headers:{'Content-Type':'application/json','apikey':SB_ANON},body:JSON.stringify({email:email,password:pwd})})
      .then(function(r){return r.ok?r.json():r.json().then(function(e){throw new Error(e.error_description||e.message||'Login falhou');});})
      .then(function(d){_tok=d.access_token;return d;});
  },
  signOut: function(){ return fetch(SB_URL+'/auth/v1/logout',{method:'POST',headers:_hdr()}).finally(function(){_tok=null;}); },
  getUser: function(){ if(!_tok)return Promise.resolve(null); return fetch(SB_URL+'/auth/v1/user',{headers:{'apikey':SB_ANON,'Authorization':'Bearer '+_tok}}).then(function(r){return r.ok?r.json():null;}); },
  resetPassword: function(email){ return fetch(SB_URL+'/auth/v1/recover',{method:'POST',headers:{'Content-Type':'application/json','apikey':SB_ANON},body:JSON.stringify({email:email})}).then(function(r){return r.ok?r.json():_err(r);}); }
};

// ── PALETA ────────────────────────────────────────────────────────────────────
var C={g0:'#0A3D2B',g1:'#0F5C3A',g2:'#1A7A4A',g3:'#2E9E63',gl:'#C8E6D4',gx:'#EAF7EE',
       b1:'#1565A8',bl:'#DCF0FF',t1:'#7B4D1A',tl:'#FAEBD7',am:'#C4832A',al:'#FFF3E0',
       rm:'#A32D2D',rl:'#FCEBEB',pm:'#5B3FA8',px:'#EDE9FB',cl:'#DEE2D8',cx:'#F7F8F5',cm:'#6B7260',cd:'#1E2218'};

// ── CONSTANTES ────────────────────────────────────────────────────────────────
var CATS = ['Monitoramento','Fiscalização','Capacitação','Programa REM','Gestão','Parceria','Evento','Legislação'];
var PL   = {admin:'Administrador',gestor:'Gestor',viewer:'Visualizador'};

var PK   = {units:'Unidades',news:'Notícias',users:'Usuários',sols:'Solicitações',feeds:'Feeds RSS',cfg:'Configurações',ia:'Assistente IA',rel:'Relatórios'};
var PD   = {admin:{units:true,news:true,users:true,sols:true,feeds:true,cfg:true,ia:true,rel:true},

var scMap = {ativo:[C.g2,C.gl],manutencao:[C.am,C.al],inativo:[C.cm,C.cx]};

// ── HELPERS PUROS ─────────────────────────────────────────────────────────────
function slabel(s){ return({ativo:'Operacional',manutencao:'Manutenção',inativo:'Inativo'}[s]||s); }
function fmtD(d)  { if(!d)return''; try{return new Date(d+'T12:00:00').toLocaleDateString('pt-BR');}catch(_){return d;} }
function getCC(cat){ return CC_MAP[cat]||[C.cm,C.cx]; }
function sanitize(s,max){ if(typeof s!=='string')return''; s=s.replace(/<[^>]*>/g,'').replace(/[<>"'`\\]/g,'').trim(); return max?s.slice(0,max):s; }

// FIX: r1 retorna null para arrays vazios (original retornava undefined)
function r1(rows){ if(Array.isArray(rows)){return rows.length?rows[0]:null;} return rows; }

// FIX: sanitização de HTML para evitar XSS em dangerouslySetInnerHTML
function safeHtml(s){
  if(!s)return'';
  return s
    .replace(/<script[\s\S]*?<\/script>/gi,'')
    .replace(/<iframe[\s\S]*?<\/iframe>/gi,'')
    .replace(/\son\w+\s*=\s*["'][^"']*["']/gi,'')
    .replace(/<link[^>]*>/gi,'');
}

// ── NORMALIZAÇÃO banco → app ──────────────────────────────────────────────────
var UN_SEL = 'id,tipo,nome,municipio,regional,lat,lng,status,taxa_uso,agendamentos_mes,descricao,historia,decreto,foto_url,quartos,salas,cozinha,auditorio,ocupacao_atual,visivel,unidades_galeria(url,legenda,ordem),unidades_extras(chave,valor,ordem),unidades_orgaos(orgao),orgaos_presentes(id,nome,tipo_uso,data_entrada,data_saida,ativo)';

function dbUnit(r){
  return {
    id:r.id, tipo:r.tipo, nome:r.nome, municipio:r.municipio, regional:r.regional,
    coords:{lat:parseFloat(r.lat)||-9.5, lng:parseFloat(r.lng)||-70.5},
    status:r.status, taxaUso:r.taxa_uso||0, ag:r.agendamentos_mes||0,
    descricao:r.descricao||'', historia:r.historia||'', decreto:r.decreto||'', foto:r.foto_url||'',
    quartos:r.quartos||0, salas:r.salas||0, cozinha:!!r.cozinha, auditorio:!!r.auditorio,
    ocupacaoAtual:r.ocupacao_atual||0, visivel:r.visivel!==false,
    galeria:(r.unidades_galeria||[]).sort(function(a,b){return(a.ordem||0)-(b.ordem||0);}).map(function(g){return{url:g.url,leg:g.legenda||''};}),
    extras:(r.unidades_extras||[]).sort(function(a,b){return(a.ordem||0)-(b.ordem||0);}).map(function(e,i){return{id:i,k:e.chave,v:e.valor};}),
    orgaos:(r.unidades_orgaos||[]).map(function(o){return o.orgao;}),
    orgaosPresentes:(r.orgaos_presentes||[]).map(function(o){return{id:o.id,nome:o.nome,tipo:o.tipo_uso,dataEntrada:o.data_entrada,dataSaida:o.data_saida,ativo:!!o.ativo};})
  };
}
function dbNews(r){ return {id:r.id,titulo:r.titulo,resumo:r.resumo||'',conteudo:r.conteudo||'',data:r.data_pub||'',categoria:r.categoria||'Gestão',unidade:r.unidade_nome||'',unidade_id:r.unidade_id||null,destaque:!!r.destaque,visivel:r.visivel!==false,fonte:r.fonte||'',autor:r.autor||''}; }
function dbSol(r) { return {id:r.id,sol:r.solicitante,org:r.orgao,email:r.email||'',un:r.unidade_nome,ev:r.tipo_evento,dt:r.data_evento,st:r.status}; }
function dbUser(r){ return {id:r.id,auth_id:r.auth_id,nome:r.nome,email:r.email,perfil:r.perfil,ativo:!!r.ativo,criadoEm:(r.criado_em||'').slice(0,10),permissoes:{units:!!r.perm_units,news:!!r.perm_news,users:!!r.perm_users,sols:!!r.perm_sols,feeds:!!r.perm_feeds,cfg:!!r.perm_cfg,ia:!!r.perm_ia,rel:!!r.perm_rel}}; }
function unitRow(u){ return {tipo:u.tipo,nome:sanitize(u.nome,120),municipio:sanitize(u.municipio,80),regional:u.regional,lat:u.coords.lat,lng:u.coords.lng,status:u.status,taxa_uso:u.taxaUso,agendamentos_mes:u.ag||0,descricao:sanitize(u.descricao,2000),historia:sanitize(u.historia,5000),decreto:sanitize(u.decreto,200),foto_url:u.foto||null,quartos:u.quartos||0,salas:u.salas||0,cozinha:!!u.cozinha,auditorio:!!u.auditorio,visivel:u.visivel!==false}; }
</script>
<script>
// ── CAMADA DE DADOS ───────────────────────────────────────────────────────────
var DB = {
  unidades: {
    list: function(soVis){ return sbGet('unidades','select='+UN_SEL+(soVis?'&visivel=eq.true':'')+'&order=nome.asc').then(function(rows){return rows.map(dbUnit);}); },
    insert: function(u){ return sbPost('unidades',unitRow(u)).then(function(rows){var id=r1(rows);if(!id)throw new Error('Falha ao criar unidade');var uid=id.id; return DB.unidades._rels(uid,u).then(function(){return uid;}); }); },
    update: function(id,u){ return sbPatch('unidades','id=eq.'+id,unitRow(u)).then(function(){return DB.unidades._rels(id,u);}); },
    toggleVis: function(id,v){ return sbPatch('unidades','id=eq.'+id,{visivel:v}); },
    del: function(id){ return sbDel('unidades','id=eq.'+id); },
    _rels: function(uid,u){
      var ps = [
        sbDel('unidades_galeria','unidade_id=eq.'+uid).then(function(){ if(!u.galeria||!u.galeria.length)return; return sbPost('unidades_galeria',u.galeria.map(function(g,i){return{unidade_id:uid,url:g.url,legenda:g.leg||'',ordem:i};})); }),
        sbDel('unidades_extras','unidade_id=eq.'+uid).then(function(){ var rows=(u.extras||[]).filter(function(e){return e.k&&e.v;}).map(function(e,i){return{unidade_id:uid,chave:sanitize(e.k,60),valor:sanitize(e.v,200),ordem:i};}); if(!rows.length)return; return sbPost('unidades_extras',rows); }),
        sbDel('unidades_orgaos','unidade_id=eq.'+uid).then(function(){ if(!u.orgaos||!u.orgaos.length)return; return sbPost('unidades_orgaos',(u.orgaos||[]).map(function(o){return{unidade_id:uid,orgao:sanitize(o,60)};})); })
      ];
      return Promise.all(ps);
    }
  },
  orgaos: {
    approve: function(uid,dados){
      var nome=sanitize(dados.nome||'',100), tipo=sanitize(dados.tipo||'',60);
      if(!nome||!tipo) return Promise.reject(new Error('Nome e tipo são obrigatórios.'));
      return sbGet('orgaos_presentes','unidade_id=eq.'+uid+'&ativo=eq.true&nome=ilike.'+encodeURIComponent(nome))
        .then(function(rows){ if(rows&&rows.length) throw new Error('Órgão "'+nome+'" já está ativo desde '+fmtD(rows[0].data_entrada)+'.'); return sbPost('orgaos_presentes',{unidade_id:uid,nome:nome,tipo_uso:tipo,data_entrada:new Date().toISOString().slice(0,10),ativo:true}); })
        .then(r1);
    },
    leave: function(oid){ return sbPatch('orgaos_presentes','id=eq.'+oid,{ativo:false,data_saida:new Date().toISOString().slice(0,10)}); }
  },
  noticias: {
    list: function(soVis){ return sbGet('noticias','select=id,titulo,resumo,conteudo,data_pub,categoria,unidade_id,unidade_nome,destaque,visivel,fonte,autor'+(soVis?'&visivel=eq.true':'')+'&order=data_pub.desc.nullslast').then(function(r){return r.map(dbNews);}); },
    insert: function(n){ return sbPost('noticias',{titulo:sanitize(n.titulo,200),resumo:sanitize(n.resumo,500),conteudo:n.conteudo||'',data_pub:n.data||null,categoria:n.categoria,unidade_id:n.unidade_id||null,destaque:!!n.destaque,visivel:n.visivel!==false,fonte:sanitize(n.fonte,120),autor:sanitize(n.autor,120)}).then(r1); },
    update: function(id,n){ return sbPatch('noticias','id=eq.'+id,{titulo:sanitize(n.titulo,200),resumo:sanitize(n.resumo,500),conteudo:n.conteudo||'',data_pub:n.data||null,categoria:n.categoria,unidade_id:n.unidade_id||null,destaque:!!n.destaque,visivel:n.visivel!==false,fonte:sanitize(n.fonte,120),autor:sanitize(n.autor,120)}); },
    toggleVis: function(id,v){ return sbPatch('noticias','id=eq.'+id,{visivel:v}); },
    del: function(id){ return sbDel('noticias','id=eq.'+id); }
  },
  feeds: {
    list: function(){ return sbGet('feeds_rss','order=nome.asc').then(function(rows){return rows.map(function(r){return{id:r.id,nome:r.nome,url:r.url,ativo:!!r.ativo,categoria:r.categoria,sync:r.ultimo_sync?r.ultimo_sync.slice(0,10):'—'};});}); },
    insert: function(f){ return sbPost('feeds_rss',{nome:sanitize(f.nome,120),url:f.url,ativo:!!f.ativo,categoria:f.categoria}); },
    update: function(id,f){ return sbPatch('feeds_rss','id=eq.'+id,{nome:sanitize(f.nome,120),url:f.url,ativo:!!f.ativo,categoria:f.categoria}); },
    sync: function(id){ return sbPatch('feeds_rss','id=eq.'+id,{ultimo_sync:new Date().toISOString()}); },
    toggleAtivo: function(id,v){ return sbPatch('feeds_rss','id=eq.'+id,{ativo:v}); },
    del: function(id){ return sbDel('feeds_rss','id=eq.'+id); }
  },
  solicitacoes: {
    list: function(){ return sbGet('solicitacoes','select=id,solicitante,orgao,email,unidade_id,unidade_nome,tipo_evento,data_evento,status&order=criado_em.desc').then(function(r){return r.map(dbSol);}); },
    // FIX: removido id gerado no cliente — deixa o Supabase gerar (coluna UUID/serial)
    insert: function(s){ return sbPost('solicitacoes',{solicitante:sanitize(s.nome,120),orgao:sanitize(s.org,80),email:sanitize(s.email,120),unidade_nome:sanitize(s.un,120),tipo_evento:sanitize(s.ev,60),data_evento:s.dt,hora_evento:s.hr||null,justificativa:sanitize(s.just,1000),status:'pendente'}).then(r1); },
    updStatus: function(id,st){ return sbPatch('solicitacoes','id=eq.'+id,{status:st}); }
  },
  usuarios: {
    COLS: 'id,auth_id,nome,email,perfil,ativo,criado_em,perm_units,perm_news,perm_users,perm_sols,perm_feeds,perm_cfg,perm_ia,perm_rel',
    list: function(){ return sbGet('usuarios','select='+DB.usuarios.COLS+'&order=nome.asc').then(function(r){return r.map(dbUser);}); },
    byAuth: function(aid){ return sbGet('usuarios','auth_id=eq.'+aid+'&select='+DB.usuarios.COLS).then(function(r){return r.length?dbUser(r[0]):null;}); },
    _pRow: function(u){ var p=u.permissoes||{}; return {nome:sanitize(u.nome,120),perfil:u.perfil||'viewer',ativo:u.ativo!==false,perm_units:!!p.units,perm_news:!!p.news,perm_users:!!p.users,perm_sols:!!p.sols,perm_feeds:!!p.feeds,perm_cfg:!!p.cfg,perm_ia:!!p.ia,perm_rel:!!p.rel}; },
    insert: function(u,aid){ return sbPost('usuarios',Object.assign({auth_id:aid,email:sanitize(u.email,120)},DB.usuarios._pRow(u))).then(r1); },
    update: function(id,u){ return sbPatch('usuarios','id=eq.'+id,DB.usuarios._pRow(u)); },
    del: function(id){ return sbDel('usuarios','id=eq.'+id); },
    toggleAtivo: function(id,v){ return sbPatch('usuarios','id=eq.'+id,{ativo:v}); }
  },
  config: {
    get: function(k){ return sbGet('config_sistema','chave=eq.'+k).then(function(r){return r.length?r[0].valor:null;}); },
    // FIX: serializa objeto como JSON string para Supabase (coluna text)
    set: function(k,v){ return sbUpsert('config_sistema',{chave:k,valor:typeof v==='string'?v:JSON.stringify(v)},'chave'); }
  }
};

<script>
// ══════════════════════════════════════════════════════════════════════════════
// PRIMITIVOS UI
// ══════════════════════════════════════════════════════════════════════════════
function Pill(p){
  return h('span',{style:{fontSize:p.s||11,fontWeight:500,padding:'3px 10px',borderRadius:20,background:p.b||C.cl,color:p.c||C.cd,whiteSpace:'nowrap',display:'inline-block'}},p.t);
}
function Bar(p){
  var v=p.v||0, cor=v>80?C.rm:v>60?C.am:C.g2;
  return h('div',{style:{height:6,background:C.cl,borderRadius:3,overflow:'hidden'}},
    h('div',{style:{height:'100%',width:Math.min(100,v)+'%',background:cor,borderRadius:3,transition:'width .6s'}}));
}
function Card(p){
  return h('div',{style:Object.assign({background:'#fff',border:'1px solid '+C.cl,borderRadius:14},p.style||{}),onClick:p.onClick,onMouseEnter:p.onMouseEnter,onMouseLeave:p.onMouseLeave},p.children);
}
function StatBox(p){
  return h('div',{style:{background:C.cx,borderRadius:12,padding:'14px 18px'}},
    h('div',{style:{fontSize:11,color:C.cm,marginBottom:4,textTransform:'uppercase',letterSpacing:.5}},p.label),
    h('div',{style:{fontSize:22,fontWeight:700,color:p.color||C.g2,lineHeight:1}},p.value));
}
function Modal(p){
  return h('div',{onClick:p.onClose,style:{position:'fixed',inset:0,background:'rgba(0,0,0,.55)',zIndex:2000,display:'flex',alignItems:'center',justifyContent:'center',padding:16}},

function ChatIA(p){

      setMsgs(nm.concat([{role:'assistant',content:txt}]));
    })

      h('div',{ref:endRef})),
    h('div',{style:{padding:'10px 12px',borderTop:'1px solid '+C.cl,display:'flex',gap:8}},
      h('input',{value:inp,onChange:function(e){setInp(e.target.value);},onKeyDown:function(e){if(e.key==='Enter')send();},placeholder:apiOk?'Pergunte sobre as unidades...':'Configure a chave de API...',disabled:!apiOk,style:{opacity:apiOk?1:.6}}),

<script>

var DEFAULT_SECS={hero:true,alertas:true,bloco:true,mapa:true,dash:true,acesso:true,noticias:true,chat:true};

function App(){

  var sNw=useState([]);           var noticias=sNw[0],setNoticias=sNw[1];
  var sSol=useState([]);          var solic=sSol[0],setSolic=sSol[1];
  var sSe=useState(DEFAULT_SECS); var secs=sSe[0],setSecs=sSe[1];
  var sLd=useState(true);         var loading=sLd[0],setLoading=sLd[1];

  var sNV=useState(null);         var nVista=sNV[0],setNVista=sNV[1];
  var sFi=useState('');           var filtro=sFi[0],setFiltro=sFi[1];

  function t2(m,c){setToast({m:m,c:c||C.g2});setTimeout(function(){setToast(null);},3200);}

  function loadAll(){
    if(!SB_OK){setLoading(false);return;}
    setLoading(true);
    Promise.all([
      DB.unidades.list(),
      DB.noticias.list(),
      DB.solicitacoes.list(),
      DB.auth.me(),
      DB.config.get('secs_home')
    ]).then(function(res){
      setUnidades(res[0]||[]);
      setNoticias(res[1]||[]);
      setSolic(res[2]||[]);
      setUser(res[3]||null);
      if(res[4]){try{setSecs(JSON.parse(res[4]));}catch(_){}}
      setLoading(false);
      setErro(null);
    }).catch(function(e){
      setErro(e.message||'Erro ao carregar dados');
      setLoading(false);
    });
  }

  useEffect(function(){loadAll();},[]);

  // Computed
  var cimas=unidades.filter(function(u){return u.tipo==='CIMA';});
  var ugais=unidades.filter(function(u){return u.tipo==='UGAI';});
  var ativas=unidades.filter(function(u){return u.status==='ativo';});
  var manut=unidades.filter(function(u){return u.status==='manutencao';});
  var inativas=unidades.filter(function(u){return u.status==='inativo';});
  var filtrados=filtro?unidades.filter(function(u){
    var q=filtro.toLowerCase();
    return (u.nome||'').toLowerCase().includes(q)||(u.municipio||'').toLowerCase().includes(q);
  }):unidades;

  // Alertas de manutenção
  var alertasManut=unidades.filter(function(u){return u.status==='manutencao';});

  // Detalhe unidade

    h(PageUnidade,{u:uVista,go:go,user:user,t2:t2,reload:loadAll}),
    h(Footer,null),
    toast&&h(Toast,{msg:toast.m,color:toast.c,onDone:function(){setToast(null);}})
  );

  // Detalhe notícia
  if(nVista)return h('div',null,
    h(Navbar,{go:go,user:user,page:page,menuAberto:menuAberto,setMenuAberto:setMenuAberto}),
    h(PageNoticia,{n:nVista,go:go}),
    h(Footer,null),
    toast&&h(Toast,{msg:toast.m,color:toast.c,onDone:function(){setToast(null);}})
  );

  // ── Seções da Home ─────────────────────────────────────────────────────────
  function SecHero(){

      h('div',{style:{position:'absolute',top:0,left:0,right:0,bottom:0,opacity:.07,backgroundImage:'repeating-linear-gradient(45deg,#fff 0,#fff 1px,transparent 0,transparent 50%)',backgroundSize:'20px 20px'}}),
      h('div',{style:{position:'relative',maxWidth:900,margin:'0 auto'}},

        h('h1',{style:{fontSize:'clamp(28px,5vw,52px)',fontWeight:900,margin:'0 0 18px',lineHeight:1.1}},'Gestão das Unidades',h('br'),h('span',{style:{color:'#7ddba8'}},'Ambientais do Acre')),
        h('p',{style:{fontSize:'clamp(14px,2vw,18px)',opacity:.85,maxWidth:620,margin:'0 auto 32px',lineHeight:1.7}},'Monitore, gerencie e consulte as informações das unidades CIMA e UGAI do Estado do Acre em tempo real.'),
        h('div',{style:{display:'flex',gap:12,justifyContent:'center',flexWrap:'wrap'}},
          h('button',{type:'button',onClick:function(){go('mapa');},style:{background:'#7ddba8',color:'#0a3d2e',border:'none',borderRadius:8,padding:'12px 28px',fontWeight:700,fontSize:15,cursor:'pointer'}},'🗺️ Ver Mapa'),
          h('button',{type:'button',onClick:function(){go('cima');},style:{background:'rgba(255,255,255,.15)',color:'#fff',border:'2px solid rgba(255,255,255,.4)',borderRadius:8,padding:'12px 28px',fontWeight:700,fontSize:15,cursor:'pointer'}},'Ver Unidades')

  function SecAlertas(){

        h('span',{style:{fontSize:20}},'⚠️'),
        h('strong',{style:{color:'#7a4e00',fontSize:14}},'Manutenção em andamento:'),
        h('span',{style:{color:'#7a4e00',fontSize:13}},' '+alertasManut.map(function(u){return u.nome;}).join(', '))
      )

  function SecBloco(){
    var cards=[
      {label:'Unidades Ativas',val:ativas.length,icon:'✅',color:'#1A7A4A'},
      {label:'Em Manutenção',val:manut.length,icon:'🔧',color:'#C4832A'},

      {label:'Total UGAI',val:ugais.length,icon:'🏞️',color:'#1565A8'},
    ];
    return h('section',{style:{background:'#f5f9f6',padding:'40px 20px'}},
      h('div',{style:{maxWidth:1100,margin:'0 auto'}},
        h('h2',{style:{textAlign:'center',color:'#0a3d2e',fontSize:22,fontWeight:800,marginBottom:28}},'Resumo das Unidades'),
        h('div',{style:{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(160px,1fr))',gap:16}},
          cards.map(function(c,i){
            return h('div',{key:i,style:{background:'#fff',borderRadius:12,padding:'22px 16px',textAlign:'center',boxShadow:'0 2px 8px rgba(0,0,0,.07)',borderTop:'4px solid '+c.color}},
              h('div',{style:{fontSize:28,marginBottom:6}},c.icon),
              h('div',{style:{fontSize:32,fontWeight:900,color:c.color,lineHeight:1}},c.val),
              h('div',{style:{fontSize:12,color:'#666',marginTop:6,fontWeight:600}},c.label)
            );
          })
        )
      )
    );
  }

  function SecMapa(){
    var html=buildMapHtml(unidades,function(id){var u=unidades.find(function(x){return x.id===id;});if(u)setUVista(u);});
    return h('section',{style:{padding:'40px 20px',background:'#fff'}},
      h('div',{style:{maxWidth:1100,margin:'0 auto'}},
        h('div',{style:{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:20,flexWrap:'wrap',gap:10}},
          h('h2',{style:{color:'#0a3d2e',fontSize:22,fontWeight:800,margin:0}},'Mapa das Unidades'),
          h('button',{type:'button',onClick:function(){go('mapa');},style:{background:C.g2,color:'#fff',border:'none',borderRadius:8,padding:'8px 20px',fontWeight:700,cursor:'pointer',fontSize:13}},'Ver mapa completo')
        ),
        h('div',{style:{borderRadius:12,overflow:'hidden',boxShadow:'0 4px 16px rgba(0,0,0,.1)',height:420}},
          h('iframe',{srcDoc:html,style:{width:'100%',height:'100%',border:'none'},title:'Mapa das unidades ambientais',
            onLoad:function(e){
              e.target.contentWindow.addEventListener('message',function(ev){
                if(ev.data&&ev.data.type==='openUnit'){
                  var u=unidades.find(function(x){return String(x.id)===String(ev.data.id);});
                  if(u)setUVista(u);
                }
              });
            }
          })
        )
      )
    );
  }

  function SecDash(){
    var totalArea=unidades.reduce(function(s,u){return s+(parseFloat(u.area_ha)||0);},0);
    var muns=[...new Set(unidades.map(function(u){return u.municipio;}).filter(Boolean))];
    var stats=[
      {icon:'📐',label:'Área total (ha)',val:totalArea.toLocaleString('pt-BR',{maximumFractionDigits:0})},
      {icon:'📍',label:'Municípios',val:muns.length},
      {icon:'📋',label:'Solicitações',val:solic.length},
      {icon:'📰',label:'Notícias',val:noticias.length},
    ];
    return h('section',{style:{background:'#0a3d2e',padding:'40px 20px'}},
      h('div',{style:{maxWidth:1100,margin:'0 auto'}},
        h('h2',{style:{textAlign:'center',color:'#7ddba8',fontSize:22,fontWeight:800,marginBottom:28}},'Indicadores'),
        h('div',{style:{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(180px,1fr))',gap:16}},
          stats.map(function(s,i){

              h('div',{style:{fontSize:12,color:'rgba(255,255,255,.6)',marginTop:6,fontWeight:600}},s.label)
            );
          })
        )
      )

  }

  function SecAcesso(){

      {icon:'🌳',label:'CIMA',desc:'Centros de Interpretação do Meio Ambiente',page:'cima',color:'#1A7A4A'},
      {icon:'🏞️',label:'UGAI',desc:'Unidades de Gestão Ambiental Integrada',page:'ugai',color:'#1565A8'},
      {icon:'🗺️',label:'Mapa',desc:'Visualização geoespacial das unidades',page:'mapa',color:'#2e7d32'},
      {icon:'📋',label:'Solicitações',desc:'Enviar ou acompanhar solicitações',page:'sol',color:'#C4832A'},
      {icon:'📰',label:'Notícias',desc:'Comunicados e publicações da SEMA',page:'noticias',color:'#555'},
      {icon:'🔍',label:'Transparência',desc:'Dados abertos e relatórios públicos',page:'transp',color:'#1565A8'},

    return h('section',{style:{background:'#f5f9f6',padding:'40px 20px'}},
      h('div',{style:{maxWidth:1100,margin:'0 auto'}},
        h('h2',{style:{textAlign:'center',color:'#0a3d2e',fontSize:22,fontWeight:800,marginBottom:28}},'Acesso Rápido'),
        h('div',{style:{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(200px,1fr))',gap:16}},
          links.map(function(l,i){
            return h('button',{key:i,type:'button',onClick:function(){go(l.page);},
              style:{background:'#fff',border:'none',borderRadius:12,padding:'24px 16px',textAlign:'center',
                boxShadow:'0 2px 8px rgba(0,0,0,.07)',cursor:'pointer',transition:'transform .15s',
                borderTop:'4px solid '+l.color}},
              h('div',{style:{fontSize:34,marginBottom:8}},l.icon),
              h('div',{style:{fontWeight:700,color:l.color,fontSize:15,marginBottom:4}},l.label),
              h('div',{style:{fontSize:12,color:'#666',lineHeight:1.4}},l.desc)
            );
          })
        )
      )
    );
  }

  function SecNoticias(){
    var recentes=noticias.slice(0,3);
    return h('section',{style:{background:'#fff',padding:'40px 20px'}},
      h('div',{style:{maxWidth:1100,margin:'0 auto'}},
        h('div',{style:{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:28,flexWrap:'wrap',gap:10}},
          h('h2',{style:{color:'#0a3d2e',fontSize:22,fontWeight:800,margin:0}},'Últimas Notícias'),
          h('button',{type:'button',onClick:function(){go('noticias');},style:{background:'none',border:'1px solid '+C.g2,color:C.g2,borderRadius:8,padding:'7px 18px',fontWeight:700,cursor:'pointer',fontSize:13}},'Ver todas')
        ),

          ? h('div',{style:{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(280px,1fr))',gap:20}},

                  h('div',{style:{padding:'16px'}},
                    h('div',{style:{fontSize:11,color:C.g2,fontWeight:700,textTransform:'uppercase',marginBottom:6}},n.categoria||'Notícia'),
                    h('h3',{style:{fontSize:16,fontWeight:700,color:'#111',margin:'0 0 8px',lineHeight:1.4}},n.titulo||''),
                    h('p',{style:{fontSize:13,color:'#555',margin:0,lineHeight:1.5}},
                      (n.resumo||(n.conteudo||'').substring(0,120)).substring(0,120)+(((n.resumo||n.conteudo||'').length>120)?'…':'')
                    )
                  )
                );
              })
            )
          : h('p',{style:{color:'#999',textAlign:'center',fontSize:14}},'Nenhuma notícia publicada.')
      )
    );
  }

  function SecChat(){
    return h('section',{style:{background:'#f5f9f6',padding:'40px 20px'}},
      h('div',{style:{maxWidth:700,margin:'0 auto'}},
        h('h2',{style:{textAlign:'center',color:'#0a3d2e',fontSize:22,fontWeight:800,marginBottom:20}},'Assistente IA'),
        h(ChatIA,null)
      )
    );
  }

  // ── Páginas ────────────────────────────────────────────────────────────────
  function PgHome(){
    if(loading)return h('div',{style:{textAlign:'center',padding:'80px 20px',color:C.g2,fontSize:18}},'Carregando…');

    );

          style:{padding:'8px 14px',borderRadius:8,border:'1px solid #ccc',fontSize:14,width:220}})
      ),
      h('div',{style:{borderRadius:12,overflow:'hidden',boxShadow:'0 4px 16px rgba(0,0,0,.1)',height:'calc(100vh - 160px)',minHeight:400}},

          }
        })
      )

  function PgLista(tipo){
    var lista=(tipo==='CIMA'?cimas:ugais).filter(function(u){
      if(!filtro)return true;
      var q=filtro.toLowerCase();
      return (u.nome||'').toLowerCase().includes(q)||(u.municipio||'').toLowerCase().includes(q);
    });
    var cor=tipo==='CIMA'?'#1A7A4A':'#1565A8';
    return h('div',{style:{padding:'20px',maxWidth:1100,margin:'0 auto'}},
      h('div',{style:{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:20,flexWrap:'wrap',gap:10}},

        h('input',{type:'search',placeholder:'Buscar…',value:filtro,onChange:function(e){setFiltro(e.target.value);},
          style:{padding:'8px 14px',borderRadius:8,border:'1px solid #ccc',fontSize:14,width:220}})
      ),

            lista.map(function(u){
              var scMap={ativo:C.g2,manutencao:'#C4832A',inativo:'#888'};
              var sc=scMap[u.status]||'#ccc';
              return h('div',{key:u.id,
                style:{background:'#fff',borderRadius:12,padding:'20px',boxShadow:'0 2px 8px rgba(0,0,0,.07)',
                  cursor:'pointer',borderLeft:'5px solid '+sc},
                onClick:function(){setUVista(u);}},
                h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:10}},
                  h('h3',{style:{fontSize:16,fontWeight:700,color:'#111',margin:0,lineHeight:1.3}},u.nome||'—'),
                  h('span',{style:{background:sc,color:'#fff',borderRadius:20,padding:'2px 10px',fontSize:11,fontWeight:700,whiteSpace:'nowrap'}},u.status||'—')
                ),
                h('div',{style:{fontSize:13,color:'#555'}},
                  u.municipio&&h('div',null,'📍 '+u.municipio),
                  u.area_ha&&h('div',null,'📐 '+parseFloat(u.area_ha).toLocaleString('pt-BR')+'  ha'),
                  u.bioma&&h('div',null,'🌿 '+u.bioma)
                )
              );
            })
          )
    );
  }

  function PgNoticias(){
    return h('div',{style:{padding:'20px',maxWidth:1100,margin:'0 auto'}},
      h('h1',{style:{color:'#0a3d2e',fontSize:22,fontWeight:800,marginBottom:24}},'📰 Notícias'),
      noticias.length===0
        ? h('p',{style:{color:'#999',textAlign:'center',padding:'40px 0',fontSize:15}},'Nenhuma notícia publicada.')
        : h('div',{style:{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(280px,1fr))',gap:20}},
            noticias.map(function(n){
              return h('div',{key:n.id,style:{background:'#fff',borderRadius:12,overflow:'hidden',
                boxShadow:'0 2px 8px rgba(0,0,0,.07)',cursor:'pointer'},
                onClick:function(){setNVista(n);}},
                n.imagem_url&&h('img',{src:n.imagem_url,alt:n.titulo||'',style:{width:'100%',height:180,objectFit:'cover'}}),
                h('div',{style:{padding:'16px'}},
                  h('div',{style:{fontSize:11,color:C.g2,fontWeight:700,textTransform:'uppercase',marginBottom:6}},n.categoria||'Notícia'),
                  h('h3',{style:{fontSize:16,fontWeight:700,color:'#111',margin:'0 0 8px',lineHeight:1.4}},n.titulo||''),
                  h('p',{style:{fontSize:13,color:'#555',margin:0,lineHeight:1.5}},
                    (n.resumo||(n.conteudo||'').substring(0,140)).substring(0,140)+(((n.resumo||n.conteudo||'').length>140)?'…':'')
                  ),
                  n.created_at&&h('div',{style:{fontSize:11,color:'#aaa',marginTop:10}},new Date(n.created_at).toLocaleDateString('pt-BR'))
                )
              );
            })
          )
    );
  }

  function PgSol(){
    return h('div',{style:{padding:'20px',maxWidth:800,margin:'0 auto'}},
      h('h1',{style:{color:'#0a3d2e',fontSize:22,fontWeight:800,marginBottom:8}},'📋 Solicitações'),
      h('p',{style:{color:'#555',fontSize:14,marginBottom:28}},'Envie uma solicitação, dúvida ou denúncia relacionada às unidades ambientais do Acre.'),
      h(FormSol,{t2:t2,reload:loadAll})
    );
  }

  function PgTransp(){
    var cols=['nome','tipo','municipio','status','area_ha','bioma','criacao'];
    function exportCSV(){
      if(!unidades.length){t2('Sem dados para exportar','#C4832A');return;}
      var rows=[cols].concat(unidades.map(function(u){return cols.map(function(c){return u[c]||''});}));
      var csv=rows.map(function(r){return r.map(function(v){return '"'+String(v).replace(/"/g,'""')+'"';}).join(',');}).join('\n');
      var a=document.createElement('a');
      a.href='data:text/csv;charset=utf-8,\uFEFF'+encodeURIComponent(csv);
      a.download='unidades_sema_ac.csv';
      a.click();
      t2('CSV exportado!');
    }
    function exportXLSX(){
      if(!window.XLSX){t2('Biblioteca XLSX não disponível','#C4832A');return;}
      if(!unidades.length){t2('Sem dados para exportar','#C4832A');return;}
      var ws=XLSX.utils.json_to_sheet(unidades.map(function(u){
        return {Nome:u.nome||'',Tipo:u.tipo||'',Município:u.municipio||'',Status:u.status||'',
          'Área (ha)':u.area_ha||'',Bioma:u.bioma||'',Criação:u.criacao||''};
      }));
      var wb=XLSX.utils.book_new();
      XLSX.utils.book_append_sheet(wb,ws,'Unidades');
      XLSX.writeFile(wb,'unidades_sema_ac.xlsx');
      t2('XLSX exportado!');
    }
    return h('div',{style:{padding:'20px',maxWidth:1100,margin:'0 auto'}},
      h('h1',{style:{color:'#0a3d2e',fontSize:22,fontWeight:800,marginBottom:8}},'🔍 Transparência'),
      h('p',{style:{color:'#555',fontSize:14,marginBottom:24}},'Dados públicos das unidades ambientais do Estado do Acre. Exporte ou consulte abaixo.'),
      h('div',{style:{display:'flex',gap:12,marginBottom:24,flexWrap:'wrap'}},
        h('button',{type:'button',onClick:exportCSV,style:{background:'#1A7A4A',color:'#fff',border:'none',borderRadius:8,padding:'10px 20px',fontWeight:700,cursor:'pointer',fontSize:14}},'⬇️ Exportar CSV'),
        h('button',{type:'button',onClick:exportXLSX,style:{background:'#1565A8',color:'#fff',border:'none',borderRadius:8,padding:'10px 20px',fontWeight:700,cursor:'pointer',fontSize:14}},'⬇️ Exportar XLSX')
      ),
      h('div',{style:{overflowX:'auto'}},
        h('table',{style:{width:'100%',borderCollapse:'collapse',fontSize:13}},
          h('thead',null,
            h('tr',{style:{background:'#0a3d2e',color:'#fff'}},
              cols.map(function(c){return h('th',{key:c,style:{padding:'10px 14px',textAlign:'left',fontWeight:700,whiteSpace:'nowrap'}},c.toUpperCase());})
            )
          ),
          h('tbody',null,
            unidades.length===0
              ? h('tr',null,h('td',{colSpan:cols.length,style:{padding:'24px',textAlign:'center',color:'#999'}},'Nenhum registro.'))
              : unidades.map(function(u,i){
                  return h('tr',{key:u.id,style:{background:i%2?'#f9f9f9':'#fff'}},
                    cols.map(function(c){return h('td',{key:c,style:{padding:'9px 14px',borderBottom:'1px solid #eee'}},u[c]||'—');})
                  );
                })
          )
        )
      )
    );
  }

  // ── Main render ─────────────────────────────────────────────────────────────
  var content;
  if(page==='mapa')          content=h(PgMapa,null);
  else if(page==='cima')     content=h(PgLista,'CIMA');
  else if(page==='ugai')     content=h(PgLista,'UGAI');
  else if(page==='noticias') content=h(PgNoticias,null);
  else if(page==='sol')      content=h(PgSol,null);
  else if(page==='transp')   content=h(PgTransp,null);
  else if(page==='admin')    content=h(AdminPanel,{user:user,unidades:unidades,noticias:noticias,solic:solic,secs:secs,setSecs:setSecs,t2:t2,reload:loadAll,go:go});
  else                       content=h(PgHome,null);

  return h('div',{style:{minHeight:'100vh',display:'flex',flexDirection:'column',fontFamily:"'Segoe UI',system-ui,sans-serif"}},
    h(Navbar,{go:go,user:user,page:page,menuAberto:menuAberto,setMenuAberto:setMenuAberto}),
    h('main',{style:{flex:1}},
      !SB_OK&&page!=='home'&&h('div',{style:{background:'#fff3cd',borderBottom:'2px solid #ffc107',padding:'8px 20px',textAlign:'center',fontSize:13,color:'#856404'}},
        '⚙️ Supabase não configurado — dados indisponíveis. Configure ',h('code',null,'window.__SB_URL__'),' e ',h('code',null,'window.__SB_ANON__'),'.'
      ),
      erro&&h('div',{style:{background:'#ffeaea',borderBottom:'2px solid #e53935',padding:'8px 20px',textAlign:'center',fontSize:13,color:'#b71c1c'}},
        '⚠️ '+erro+' ',h('button',{type:'button',onClick:loadAll,style:{background:'none',border:'1px solid #e53935',borderRadius:4,padding:'2px 10px',color:'#b71c1c',cursor:'pointer',fontSize:12}},'Tentar novamente')
      ),
      content
    ),
    h(Footer,null),
    toast&&h(Toast,{msg:toast.m,color:toast.c,onDone:function(){setToast(null);}})
  );
}

// ── Bootstrap ─────────────────────────────────────────────────────────────────
var root;
try{
  root=ReactDOM.createRoot(document.getElementById('root'));
  root.render(h(React.StrictMode,null,h(App,null)));
}catch(e){
  document.getElementById('root').innerHTML=
    '<div style="font-family:sans-serif;padding:40px;text-align:center;color:#b71c1c">'+
    '<div style="font-size:48px;margin-bottom:16px">⚠️</div>'+
    '<h2>Erro ao inicializar</h2>'+
    '<pre style="background:#f5f5f5;padding:16px;border-radius:8px;text-align:left;overflow:auto;font-size:13px">'+
    (e&&e.stack||e).toString().replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')+
    '</pre></div>';
}
</script>
</body>
</html>
