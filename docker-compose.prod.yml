services:
  db:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-afj_core}
      POSTGRES_USER: ${POSTGRES_USER:-afj}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD obrigatório}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-afj}"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1G

  redis:
    image: redis:7-alpine
    restart: always
    command: redis-server --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD obrigatório} --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M

  qdrant:
    image: qdrant/qdrant:latest
    restart: always
    volumes:
      - qdrantdata:/qdrant/storage
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1G

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: always
    env_file:
      - .env.prod
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-afj}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-afj_core}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      QDRANT_URL: http://qdrant:6333
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 2
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 1G

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: always
    env_file:
      - .env.prod
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-afj}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-afj_core}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      QDRANT_URL: http://qdrant:6333
    command: celery -A app.workers.celery_app worker --loglevel=info --concurrency=2
    depends_on:
      - backend
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M

  scheduler:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: always
    env_file:
      - .env.prod
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-afj}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-afj_core}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
    command: celery -A app.workers.celery_app beat --loglevel=info
    depends_on:
      - worker
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 128M

  pgbackup:
    image: prodrigorocha/pgbackup:latest
    restart: always
    environment:
      POSTGRES_HOST: db
      POSTGRES_DB: ${POSTGRES_DB:-afj_core}
      POSTGRES_USER: ${POSTGRES_USER:-afj}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      BACKUP_DIR: /backups
      SCHEDULE: "0 2 * * *"  # 02:00 diário
      BACKUP_KEEP_DAYS: 30
    volumes:
      - backups:/backups
    depends_on:
      db:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 128M

volumes:
  pgdata:
  redisdata:
  qdrantdata:
  backups:
